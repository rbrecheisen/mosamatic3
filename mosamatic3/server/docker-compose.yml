services:
  redis:
    image: redis:7-alpine
    container_name: mosamatic3-django-redis
    restart: unless-stopped
    ports:
    - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    image: brecheisen/mosamatic3:latest
    container_name: mosamatic3-django-web
    restart: unless-stopped
    environment:
      SECRET_KEY: change-me-in-production
      DEBUG: "0"
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      CSRF_TRUSTED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
      USE_X_FORWARDED_HOST: "1"
      SECURE_PROXY_SSL_HEADER: "0"
      DATABASE_URL: sqlite:////data/app.db
      UPLOAD_ROOT: /data/uploads
      STATIC_ROOT: /staticfiles
      ADMIN_USERNAME: admin
      # ADMIN_PASSWORD_FILE: /run/secrets/admin_password.txt
      ADMIN_PASSWORD: admin
      LOG_DIR: /data/logs
      LOG_LEVEL: INFO
      LOG_MAX_BYTES: "10485760"
      LOG_BACKUP_COUNT: "5"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      GUNICORN_WORKERS: "3"
      GUNICORN_TIMEOUT: "120"
    volumes:
      - server_data:/data
      - staticfiles:/staticfiles
      # - ./data/admin_password.txt:/run/secrets/admin_password.txt:ro
    expose:
      - "8000"
    depends_on:
      - redis

  pipeline-worker:
    image: brecheisen/mosamatic3:latest
    container_name: mosamatic3-django-pipeline-worker
    restart: unless-stopped
    environment:
      SECRET_KEY: change-me-in-production
      DEBUG: "0"
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DATABASE_URL: sqlite:////data/app.db
      UPLOAD_ROOT: /data/uploads
      STATIC_ROOT: /staticfiles
      ADMIN_USERNAME: admin
      # ADMIN_PASSWORD_FILE: /run/secrets/admin_password.txt
      ADMIN_PASSWORD: admin
      LOG_DIR: /data/logs
      LOG_LEVEL: INFO
      LOG_MAX_BYTES: "10485760"
      LOG_BACKUP_COUNT: "5"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_LOGLEVEL: info
      CELERY_POOL: solo
      CELERY_QUEUE: pipeline
      CELERY_WORKER_NAME: pipeline
    volumes:
      - server_data:/data
      - staticfiles:/staticfiles
      # - ./data/admin_password.txt:/run/secrets/admin_password.txt:ro
    command: ["/app/docker/entrypoint-worker.sh"]
    depends_on:
      - redis

  task-worker:
    image: brecheisen/mosamatic3:latest
    container_name: mosamatic3-django-task-worker
    restart: unless-stopped
    environment:
      SECRET_KEY: change-me-in-production
      DEBUG: "0"
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DATABASE_URL: sqlite:////data/app.db
      UPLOAD_ROOT: /data/uploads
      STATIC_ROOT: /staticfiles
      ADMIN_USERNAME: admin
      # ADMIN_PASSWORD_FILE: /run/secrets/admin_password.txt
      ADMIN_PASSWORD: admin
      LOG_DIR: /data/logs
      LOG_LEVEL: INFO
      LOG_MAX_BYTES: "10485760"
      LOG_BACKUP_COUNT: "5"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_LOGLEVEL: info
      CELERY_POOL: solo
      CELERY_QUEUE: tasks
      CELERY_WORKER_NAME: tasks
    volumes:
      - server_data:/data
      - staticfiles:/staticfiles
      # - ./data/admin_password.txt:/run/secrets/admin_password.txt:ro
    command: ["/app/docker/entrypoint-worker.sh"]
    depends_on:
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: mosamatic3-django-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/staticfiles:ro
    depends_on:
      - web

volumes:
  server_data:
  staticfiles:
  redis_data: