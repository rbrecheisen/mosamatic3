{% extends 'base.html' %}
{% block content %}
<section class="card">
  <h2>{{ task.name }}</h2>
  <p class="muted">{{ task.description }}</p>
  <form id="params-form" class="stack">
    {% csrf_token %}
    <div id="fields"></div>
    <div class="row"><button id="save-button" type="submit">Save parameters</button><button id="run-button" type="button" disabled>Run</button><button id="cancel-button" type="button" class="warning" style="display:none">Cancel</button></div>
  </form>
  <p id="task-message" class="message" style="display:none"></p>
</section>
<script id="schema-data" type="application/json">{{ schema_json|safe }}</script>
<script id="saved-data" type="application/json">{{ saved_json|safe }}</script>
<script>
const taskKey = '{{ task.key }}';
const schema = JSON.parse(document.getElementById('schema-data').textContent);
const saved = JSON.parse(document.getElementById('saved-data').textContent || '{}');
const datasets = [
  {% for d in datasets %}
    {
      id: '{{ d.id }}',
      name: '{{ d.name|escapejs }}',
      kind: '{{ d.kind }}',
      status: '{{ d.status }}'
    },
  {% endfor %}
];
const fields = document.getElementById('fields');
const message = document.getElementById('task-message');
const runButton = document.getElementById('run-button');
const cancelButton = document.getElementById('cancel-button');
let activeTaskId = null;

function show(text){ message.style.display='block'; message.textContent=text; }

function buildField(name, prop){
  if (name === 'patient_id_path_part_index') {
    return;
  }
  const label = document.createElement('label');
  label.classList.add('parameter-field');
  label.textContent = prop.title || name;
  let input;
  const widget = prop.ui_widget || prop?.json_schema_extra?.ui_widget;
  if (widget === 'dataset_select') {
    input = document.createElement('select'); input.name = name;
    // input.innerHTML = '<option value="">Select dataset...</option>' + datasets.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
    input.innerHTML =
      '<option value="">Select dataset...</option>' +
      datasets
        .map(d => `<option value="${d.id}">${d.name} (${d.kind}, ${d.status})</option>`)
        .join('');
  } else if (widget === 'dataset_multiselect') {
    input = document.createElement('select'); input.name = name; input.multiple = true;
    // input.innerHTML = datasets.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
    input.innerHTML = datasets
      .map(d => `<option value="${d.id}">${d.name} (${d.kind}, ${d.status})</option>`)
      .join('');
  } else if (prop.type === 'boolean') {
    label.classList.add('checkbox-row');
    input = document.createElement('input'); input.type='checkbox'; input.name=name;
  } else if (prop.enum) {
    input = document.createElement('select'); input.name=name; input.innerHTML = prop.enum.map(v => `<option value="${v}">${v}</option>`).join('');
  } else {
    input = document.createElement('input'); input.name=name; input.type = prop.type === 'integer' || prop.type === 'number' ? 'number' : 'text';
    if (prop.minimum !== undefined) input.min = prop.minimum; if (prop.maximum !== undefined) input.max = prop.maximum;
  }
  const current = saved[name] ?? prop.default;
  if (input.type === 'checkbox') input.checked = Boolean(current); else if (input.multiple && Array.isArray(current)) Array.from(input.options).forEach(o => o.selected = current.includes(o.value)); else if (current !== undefined && current !== null) input.value = current;
  label.appendChild(input); fields.appendChild(label);
}

Object.entries(schema.properties || {}).forEach(([name, prop]) => buildField(name, prop));
runButton.disabled = Object.keys(saved).length === 0;
document.getElementById('params-form').addEventListener('submit', async (event)=>{
  event.preventDefault();
  const params = {};
  // fields.querySelectorAll('input, select').forEach(el => { params[el.name] = el.type === 'checkbox' ? el.checked : (el.multiple ? Array.from(el.selectedOptions).map(o => o.value) : (el.value === '' ? null : (el.type === 'number' ? Number(el.value) : el.value))); });
  fields.querySelectorAll('input, select').forEach(el => {
    const prop = schema.properties[el.name];

    if (el.type === 'checkbox') {
      params[el.name] = el.checked;
    } else if (el.multiple) {
      params[el.name] = Array.from(el.selectedOptions).map(o => o.value);
    } else if (el.value === '') {
      params[el.name] = prop.type === 'string' ? '' : null;
    } else if (el.type === 'number') {
      params[el.name] = Number(el.value);
    } else {
      params[el.name] = el.value;
    }
  });
  const response = await fetch(`/api/tasks/${taskKey}/parameters/`, {method:'POST', headers:{'Content-Type':'application/json','X-CSRFToken':window.csrfToken}, body:JSON.stringify({task_key:taskKey, parameters:params})});
  if(response.ok){ show('Parameters saved.'); runButton.disabled=false; } else show(await response.text());
});
runButton.addEventListener('click', async ()=>{
  const response = await fetch(`/api/tasks/${taskKey}/run/`, {method:'POST', headers:{'X-CSRFToken':window.csrfToken}});
  if(!response.ok){ show(await response.text()); return; }
  const data = await response.json(); activeTaskId = data.task_id; runButton.style.display='none'; cancelButton.style.display='inline-flex'; pollStatus();
});
cancelButton.addEventListener('click', async ()=>{ if(!activeTaskId) return; await fetch(`/api/tasks/${activeTaskId}/cancel/`, {method:'POST', headers:{'X-CSRFToken':window.csrfToken}}); show('Cancel requested.'); });
async function pollStatus(){
  if(!activeTaskId) return;
  const r = await fetch(`/api/tasks/${activeTaskId}/`); const s = await r.json();
  show(`${s.state}: ${s.message || ''} ${s.current !== undefined ? `(${s.current}/${s.total})` : ''}`);
  if(['SUCCESS','FAILURE','REVOKED'].includes(s.state)){ runButton.style.display='inline-flex'; cancelButton.style.display='none'; return; }
  setTimeout(pollStatus, 1000);
}
</script>
{% endblock %}
